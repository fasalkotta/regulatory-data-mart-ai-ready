version: 2

models:
  - name: mart_entity_monthly_regulatory_report
    description: Monthly regulatory reporting mart by legal entity and jurisdiction.
    columns:
      - name: reporting_month
        tests:
          - not_null

      - name: legal_entity_id
        description: Legal entity identifier. Can be null when source data is missing entity mapping; such rows are surfaced through DQ exceptions.

      - name: jurisdiction_code
        tests:
          - not_null

      - name: report_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['PASS', 'REVIEW', 'BLOCKED']

      - name: high_value_cross_border_transaction_count
        description: Count of settled transactions where customer country differs from legal entity country and settled volume is at least 10000 USD.
        tests:
          - not_null

      - name: high_value_cross_border_settled_volume_usd
        description: Settled USD volume for high-value cross-border settled transactions.
        tests:
          - not_null