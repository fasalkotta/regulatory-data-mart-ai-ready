name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  dbt-and-dashboard-checks:
    name: dbt and dashboard checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-snowflake==1.11.5
          pip install -r dashboard/requirements.txt

      - name: Check dbt project can parse
        run: dbt parse --project-dir dbt --profiles-dir .github/dbt_profiles --target ci

      - name: Check dbt SQL can compile
        run: dbt compile --no-populate-cache --project-dir dbt --profiles-dir .github/dbt_profiles --target ci

      - name: Check dashboard Python syntax
        run: python -m compileall dashboard
